<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meu Perfil e Downloads</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        
        <div class="profile-section">
            <div class="avatar-container">
                <img src="https://ui-avatars.com/api/?name=Logic+Flow&background=1c1c1e&color=fff&size=150" alt="Avatar" id="profile-avatar">
            </div>
            <h1 id="profile-name">Logic Flow</h1>
            <p id="profile-bio">Desenvolvedor Mobile & Criador</p>
            <button class="edit-btn" onclick="abrirModal()">Editar Perfil</button>
        </div>

        <a href="https://www.instagram.com/mariofilho1223_?igsh=MWloZHZkcGV1MXVseg==" target="_blank" class="ios-card insta-card">
            <span class="icon">📸</span>
            <div class="info">
                <strong>Instagram</strong>
                <p>@mariofilho1223_</p>
            </div>
            <span class="action insta-action">Seguir</span>
        </a>

        <div class="divider"></div>

        <h2 class="section-title">Meus Arquivos</h2>
        <div class="link-list">
            <a href="#" class="ios-card" onclick="iniciarDownload(event, this)">
                <span class="icon">📦</span>
                <div class="info">
                    <strong>Projeto Alpha</strong>
                    <p>Tamanho: 15.4 MB</p>
                </div>
                <span class="action">Obter</span>
            </a>

            <a href="#" class="ios-card" onclick="iniciarDownload(event, this)">
                <span class="icon">⚙️</span>
                <div class="info">
                    <strong>Ajuste System</strong>
                    <p>Tamanho: 42.1 MB</p>
                </div>
                <span class="action">Obter</span>
            </a>
        </div>
    </div>

    <div id="edit-modal" class="modal">
    <div class="modal-content">
        <h3>Editar Perfil</h3>
        
        <label>Foto de Perfil:</label>
        <input type="file" id="input-file" accept="image/*" style="padding: 5px; background: none;">
        
        <label>Nickname:</label>
        <input type="text" id="input-name" placeholder="Seu nome">
        
        <label>Biografia:</label>
        <input type="text" id="input-bio" placeholder="Sua bio">
        
        <div class="modal-actions">
            <button class="btn-cancel" onclick="fecharModal()">Cancelar</button>
            <button class="btn-save" onclick="salvarPerfil()">Salvar</button>
        </div>
    </div>
</div>


    <script src="script.js"></script>
</body>
</html>
